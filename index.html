
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>النظام الترددي اللغوي</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #0f172a;
      color: #e5e7eb;
      margin: 0;
      padding: 0;
      direction: rtl;
    }
    .container {
      max-width: 900px;
      margin: 40px auto;
      background: #020617;
      border-radius: 12px;
      padding: 24px 28px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
      border: 1px solid #1f2937;
    }
    h1 {
      text-align: center;
      margin-bottom: 8px;
      color: #38bdf8;
      font-size: 1.6rem;
    }
    h2 {
      margin-top: 24px;
      margin-bottom: 8px;
      font-size: 1.1rem;
      color: #e5e7eb;
    }
    p {
      margin-top: 0;
      margin-bottom: 12px;
      font-size: 0.9rem;
      color: #9ca3af;
    }
    label {
      display: block;
      margin-bottom: 6px;
      font-size: 0.9rem;
    }
    input[type="text"], input[type="number"] {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #374151;
      background: #020617;
      color: #e5e7eb;
      font-size: 0.95rem;
      box-sizing: border-box;
    }
    button {
      margin-top: 10px;
      padding: 8px 16px;
      border-radius: 999px;
      border: none;
      background: #38bdf8;
      color: #020617;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.9rem;
    }
    button:hover {
      background: #0ea5e9;
    }
    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      margin-top: 10px;
    }
    .card {
      flex: 1 1 350px;
      background: #020617;
      border-radius: 10px;
      padding: 14px 16px;
      border: 1px solid #1f2937;
    }
    .output {
      margin-top: 8px;
      padding: 8px 10px;
      border-radius: 8px;
      background: #020617;
      border: 1px dashed #4b5563;
      font-family: "JetBrains Mono", monospace;
      font-size: 0.9rem;
      word-wrap: break-word;
    }
    .copy-btn {
      margin-top: 6px;
      background: #4ade80;
      color: #020617;
    }
    .copy-btn:hover {
      background: #22c55e;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>النظام الترددي اللغوي</h1>

    <h2>إعدادات النظام</h2>
    <label>f₀ (هرتز):</label>
    <input id="f0Input" type="number" value="1000000">

    <label>Δf (هرتز):</label>
    <input id="dfInput" type="number" step="0.0001" value="0.0001">

    <div class="row">

      <!-- كلمة → تردد -->
      <div class="card">
        <h2>تحويل كلمة إلى تردد</h2>
        <label>أدخل كلمة عربية:</label>
        <input id="wordInput" type="text" placeholder="مثال: سبحان، نبيل، يزن">
        <button onclick="encodeWord()">تحويل</button>
        <div class="output" id="wordToFreqOutput">—</div>
        <button class="copy-btn" onclick="copyFreq()">نسخ التردد</button>
      </div>

      <!-- تردد → كلمة -->
      <div class="card">
        <h2>تحويل تردد إلى كلمة</h2>
        <label>أدخل التردد (Hz):</label>
        <input id="freqInput" type="number" placeholder="مثال: 2300005">
        <button onclick="decodeFreq()">تحويل</button>
        <div class="output" id="freqToWordOutput">—</div>
      </div>

    </div>
  </div>

<script>
  const B = 32;
  const LMAX = 8;

  const indexToChar = {
    0:"",1:"ا",2:"ب",3:"ت",4:"ث",5:"ج",6:"ح",7:"خ",
    8:"د",9:"ذ",10:"ر",11:"ز",12:"س",13:"ش",14:"ص",
    15:"ض",16:"ط",17:"ظ",18:"ع",19:"غ",20:"ف",21:"ق",
    22:"ك",23:"ل",24:"م",25:"ن",26:"ه",27:"و",28:"ي"
  };

  const charToIndex = {};
  for (const [i,ch] of Object.entries(indexToChar)) {
    if (ch) charToIndex[ch] = parseInt(i);
  }

  function normalizeWord(w){ return w.replace(/\s+/g,"").trim(); }

  function wordToCode(word){
    const w = normalizeWord(word);
    const c = new Array(LMAX).fill(0);
    let pos = 0;
    for (let i = w.length - 1; i >= 0; i--){
      const idx = charToIndex[w[i]];
      if (idx === undefined) throw new Error("حرف غير مدعوم: " + w[i]);
      c[pos++] = idx;
    }
    let C = 0n;
    for (let i = 0; i < LMAX; i++){
      C += BigInt(c[i])  (BigInt(B) * BigInt(i));
    }
    return C;
  }

  function codeToWord(Cbig){
    let C = BigInt(Cbig);
    const digits = [];
    for (let i = 0; i < LMAX; i++){
      digits.push(Number(C % BigInt(B)));
      C /= BigInt(B);
    }
    let w = "";
    for (let i = LMAX - 1; i >= 0; i--){
      w += indexToChar[digits[i]] || "";
    }
    return w;
  }

  function encodeWord(){
    const f0 = Number(document.getElementById("f0Input").value);
    const df = Number(document.getElementById("dfInput").value);
    const word = document.getElementById("wordInput").value;

    try {
      const C = wordToCode(word);
      const f = f0 + Number(C) * df;
      document.getElementById("wordToFreqOutput").textContent =
        ${f.toFixed(6)} Hz;
    } catch(e){
      document.getElementById("wordToFreqOutput").textContent = "خطأ: " + e.message;
    }
  }

  function decodeFreq(){
    const f0 = Number(document.getElementById("f0Input").value);
    const df = Number(document.getElementById("dfInput").value);
    const f = Number(document.getElementById("freqInput").value);

    const C = Math.round((f - f0) / df);
    const word = codeToWord(BigInt(C));
    document.getElementById("freqToWordOutput").textContent = word || "—";
  }

  function copyFreq(){
    const text = document.getElementById("wordToFreqOutput").textContent;
    navigator.clipboard.writeText(text);
  }
</script>

</body>
</html>
`
